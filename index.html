<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VeriSafe Agent - 智能代理安全验证系统</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">VSA</span>
      <div class="brand-text">
        <h1>VeriSafe Agent</h1>
        <p>智能代理安全验证系统 · 餐厅预约演示</p>
      </div>
    </div>
    <nav class="tabs">
      <button class="tab active" data-page="reserve">预约演示</button>
      <button class="tab" data-page="compare">对比演示</button>
    </nav>
  </header>

  <main id="page-reserve" class="page active">
    <div class="col col-left">
      <h2>👤 客户档案</h2>
      <div id="persona-panel"></div>
      <div id="memory-panel"></div>
      <h2 class="col-subhead">🍽 餐厅列表</h2>
      <div id="restaurant-list"></div>
    </div>
    <div class="col col-center">
      <h2>用户输入</h2>
      <div id="input-area"></div>
    </div>
    <div class="col col-right">
      <h2>验证流程</h2>
      <div id="animation-panel"></div>
      <div id="hexagon-panel" class="hex-panel"></div>
      <div id="sms-panel" class="sms-panel"></div>
    </div>
  </main>

  <main id="page-compare" class="page">
    <div id="compare-root"></div>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
